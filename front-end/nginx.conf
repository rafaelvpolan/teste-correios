server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;   # SPA fallback
    }

    # Proxy para a API (evita CORS em produção)
    location /api/ {
        proxy_pass http://api_nginx:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}