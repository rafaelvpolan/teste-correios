services:
  api:
    image: ${API_IMAGE}
    networks:
      - app_net
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - CORREIOS_ACCESS_KEY=${CORREIOS_ACCESS_KEY}
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  api_nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./api/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./api:/var/www/html:ro
    networks:
      - app_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  frontend:
    image: ${FRONTEND_IMAGE}
    ports:
      - "3000:80"
    volumes:
      - ./front-end/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./api/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app_net
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  redis:
    image: redis:8-alpine
    networks:
      - app_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  app_net:
    driver: overlay

volumes:
  mysql_data: